  <script>
  window.addEventListener('DOMContentLoaded', () => {

    const curvePath = document.getElementById('curve-path');
    if (!curvePath) return;
    const totalLen = curvePath.getTotalLength();

    // Easing smoothstep: rallenta ai bordi, accelera al centro — identico a Easy Ease AE
    function smoothstep(t) {
      // Normalizza sin in 0-1, applica smoothstep cubico, riporta in -1/+1
      const n = (t + 1) / 2;                         // -1..1 → 0..1
      const s = n * n * (3 - 2 * n);                 // smoothstep
      return s * 2 - 1;                              // 0..1 → -1..1
    }

    // Lerp con fattore di smorzamento — crea inerzia organica
    function lerp(a, b, t) { return a + (b - a) * t; }

    function closestT(cx, cy, samples = 600) {
      let bestT = 0, bestDist = Infinity;
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const pt = curvePath.getPointAtLength(t * totalLen);
        const d = Math.hypot(pt.x - cx, pt.y - cy);
        if (d < bestDist) { bestDist = d; bestT = t; }
      }
      return bestT;
    }

    const systems = [
      {
        cx: 757.47, cy: 235.42,
        planets: ['circle-dashed-1', 'text-analisi'],
        amplitude: 0.028,
        period: 12000,
        phase: 0,
        lerpFactor: 0.032,   // inerzia: più basso = più morbido
        satellites: [{
          id: 'circle-dashed-3',
          restDx: -114.4, restDy: 28.1,
          orbitX: 10, orbitY: 8,
          orbitPeriod: 7000,
          orbitPhase: 0,
          lerpFactor: 0.025
        }]
      },
      {
        cx: 1062.16, cy: 509,
        planets: ['circle-dashed-2', 'circle-solid-2', 'text-ai'],
        amplitude: 0.025,
        period: 9500,
        phase: Math.PI * 0.7,
        lerpFactor: 0.028,
        satellites: [{
          id: 'circle-dashed-4',
          restDx: 198.0, restDy: -209.0,
          orbitX: 12, orbitY: 9,
          orbitPeriod: 8500,
          orbitPhase: Math.PI * 0.5,
          lerpFactor: 0.022
        }]
      },
      {
        cx: 577.78, cy: 600.56,
        planets: ['circle-solid-1', 'text-ottimiz'],
        amplitude: 0.030,
        period: 14000,
        phase: Math.PI * 1.4,
        lerpFactor: 0.035,
        satellites: [{
          id: 'bg-dot',
          restDx: -73.9, restDy: -79.9,
          orbitX: 9, orbitY: 7,
          orbitPeriod: 6000,
          orbitPhase: Math.PI * 1.1,
          lerpFactor: 0.028
        }]
      }
    ];

    // Inizializza stato corrente per lerp
    systems.forEach(sys => {
      sys.baseT    = closestT(sys.cx, sys.cy);
      sys.basePt   = curvePath.getPointAtLength(sys.baseT * totalLen);
      sys.planetEls = sys.planets.map(id => document.getElementById(id)).filter(Boolean);
      // Stato corrente lerp
      sys.cur = { x: 0, y: 0 };
      sys.satellites.forEach(sat => {
        sat.el  = document.getElementById(sat.id);
        sat.cur = { x: sat.restDx, y: sat.restDy };
      });
    });

    let startTime = null;

    function animate(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;

      systems.forEach(sys => {

        // Target sul path con smoothstep (easy ease)
        const raw   = Math.sin((elapsed / sys.period) * Math.PI * 2 + sys.phase);
        const eased = smoothstep(raw);
        const t  = Math.max(0, Math.min(1, sys.baseT + eased * sys.amplitude));
        const pt = curvePath.getPointAtLength(t * totalLen);
        const targetX = pt.x - sys.basePt.x;
        const targetY = pt.y - sys.basePt.y;

        // Lerp verso il target → inerzia organica
        sys.cur.x = lerp(sys.cur.x, targetX, sys.lerpFactor);
        sys.cur.y = lerp(sys.cur.y, targetY, sys.lerpFactor);

        sys.planetEls.forEach(el => {
          el.style.transform = `translate(${sys.cur.x.toFixed(3)}px, ${sys.cur.y.toFixed(3)}px)`;
        });

        // Satelliti: orbitano + seguono il sistema con lerp più lento
        sys.satellites.forEach(sat => {
          if (!sat.el) return;
          const angle   = (elapsed / sat.orbitPeriod) * Math.PI * 2 + sat.orbitPhase;
          const rawOrb  = Math.sin(angle);
          const easedOrb = smoothstep(rawOrb);
          const ox = Math.cos(angle) * sat.orbitX;
          const oy = easedOrb * sat.orbitY;

          const satTargetX = sys.cur.x + ox;
          const satTargetY = sys.cur.y + oy;

          sat.cur.x = lerp(sat.cur.x, satTargetX + sat.restDx, sat.lerpFactor);
          sat.cur.y = lerp(sat.cur.y, satTargetY + sat.restDy, sat.lerpFactor);

          sat.el.style.transform = `translate(${(sat.cur.x - sat.restDx).toFixed(3)}px, ${(sat.cur.y - sat.restDy).toFixed(3)}px)`;
        });

      });

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  });
  </script>
